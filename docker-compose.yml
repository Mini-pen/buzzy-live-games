# * PartyGames static front — attach to the same external network as Traefik.
# * Public URL: https://partygames.from-beyond.fr/ — override PARTYGAMES_HOST in .env if needed.
# * Contexte à la racine du projet PartyGame (inclut `games/` dans l’image).
services:
  partygames-web:
    build:
      context: .
      dockerfile: webserver/Dockerfile
    image: partygames-web:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      PUBLIC_URL: "${PUBLIC_URL:-https://partygames.from-beyond.fr}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET manquant dans .env}"
      GAMES_DIR: /app/games
    networks:
      - traefik
    labels:
      - "traefik.enable=true"

      # * HTTP → HTTPS (same pattern as dashboard; leave ACME HTTP-01 path untouched)
      - "traefik.http.routers.partygames-http.rule=Host(`${PARTYGAMES_HOST:-partygames.from-beyond.fr}`) && !PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.partygames-http.entrypoints=http"
      - "traefik.http.routers.partygames-http.middlewares=partygames-redirect-https"
      - "traefik.http.routers.partygames-http.service=partygames"

      # * HTTPS — tls.domains forces ACME (HTTP-01 on entrypoint http) for this host after DNS resolves.
      - "traefik.http.routers.partygames-https.rule=Host(`${PARTYGAMES_HOST:-partygames.from-beyond.fr}`)"
      - "traefik.http.routers.partygames-https.entrypoints=https"
      - "traefik.http.routers.partygames-https.tls=true"
      - "traefik.http.routers.partygames-https.tls.certresolver=cloudflare"
      - "traefik.http.routers.partygames-https.tls.domains[0].main=${PARTYGAMES_HOST:-partygames.from-beyond.fr}"
      - "traefik.http.routers.partygames-https.service=partygames"

      # * Application Node écoute sur 3000
      - "traefik.http.services.partygames.loadbalancer.server.port=3000"

      # * Middlewares local to this service (no cross-reference to the Traefik container)
      - "traefik.http.middlewares.partygames-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.partygames-redirect-https.redirectscheme.permanent=true"

networks:
  traefik:
    external: true
