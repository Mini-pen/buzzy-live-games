# * buzzy-live-games — attach to the same external network as Traefik.
# * Public URL: https://partygames.from-beyond.fr/ — override PARTYGAMES_HOST in .env if needed.
# * Build context: repo root (includes `games/` in the image).
#
# * Traefik router names use prefix "buzzylive" so they never collide with other stacks
# * (e.g. an old compose still using partygames-* on the same host).
services:
  buzzy-live-games-web:
    build:
      context: .
      dockerfile: webserver/Dockerfile
    image: buzzy-live-games:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      PUBLIC_URL: "${PUBLIC_URL:-https://partygames.from-beyond.fr}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET manquant dans .env}"
      GAMES_DIR: /app/games
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"

      # * HTTP → HTTPS (same pattern as dashboard; leave ACME HTTP-01 path untouched)
      - "traefik.http.routers.buzzylive-http.rule=Host(`${PARTYGAMES_HOST:-partygames.from-beyond.fr}`) && !PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.buzzylive-http.entrypoints=http"
      - "traefik.http.routers.buzzylive-http.middlewares=buzzylive-redirect-https"
      - "traefik.http.routers.buzzylive-http.service=buzzylive-svc"

      # * HTTPS — tls.domains forces ACME (HTTP-01 on entrypoint http) for this host after DNS resolves.
      - "traefik.http.routers.buzzylive-https.rule=Host(`${PARTYGAMES_HOST:-partygames.from-beyond.fr}`)"
      - "traefik.http.routers.buzzylive-https.entrypoints=https"
      - "traefik.http.routers.buzzylive-https.tls=true"
      - "traefik.http.routers.buzzylive-https.tls.certresolver=cloudflare"
      - "traefik.http.routers.buzzylive-https.tls.domains[0].main=${PARTYGAMES_HOST:-partygames.from-beyond.fr}"
      - "traefik.http.routers.buzzylive-https.service=buzzylive-svc"

      # * Application Node écoute sur 3000
      - "traefik.http.services.buzzylive-svc.loadbalancer.server.port=3000"

      # * Middlewares local to this service (no cross-reference to the Traefik container)
      - "traefik.http.middlewares.buzzylive-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.buzzylive-redirect-https.redirectscheme.permanent=true"

networks:
  traefik:
    external: true
